# Docker环境配置文件
# 数据库配置 (连接宿主机本地数据库)
spring.datasource.url=jdbc:mysql://host.docker.internal:3306/photo_manage?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA配置
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# Redis配置
spring.redis.host=redis
spring.redis.port=6379
spring.redis.timeout=2000ms
spring.redis.jedis.pool.max-active=8
spring.redis.jedis.pool.max-idle=8
spring.redis.jedis.pool.min-idle=0

# 文件上传配置
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.enabled=true

# 应用配置
server.port=8080
server.servlet.context-path=/

# 日志配置
logging.level.root=INFO
logging.level.com.yourpackage=DEBUG
logging.file.name=/app/logs/application.log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# 管理端点配置
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.health.redis.enabled=true

# 安全配置
spring.security.user.name=admin
spring.security.user.password=admin123
spring.security.user.roles=ADMIN

# 图片存储配置
app.upload.path=uploads
app.thumbnail.path=thumbnails
app.upload.max-size=10485760
app.image.allowed-types=jpg,jpeg,png,gif,bmp
app.image.max-width=4096
app.image.max-height=4096

# 缓存配置
spring.cache.type=redis
spring.cache.redis.time-to-live=600000
