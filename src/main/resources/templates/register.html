<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册</title>
    <style>
        body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,PingFang SC,Hiragino Sans GB,Microsoft YaHei,sans-serif;background:#B3DFFF;margin:0}
        .container{max-width:460px;margin:8vh auto;background:#fff;border-radius:12px;box-shadow:0 6px 24px rgba(0,0,0,.08);padding:28px}
        *,*:before,*:after{box-sizing:border-box}
        h1{font-size:22px;margin:0 0 18px}
        .field{margin-bottom:14px}
        label{display:block;color:#333;font-size:13px;margin-bottom:6px}
        input{display:block;width:100%;padding:10px 12px;border:1px solid #d0d7de;border-radius:8px;outline:none;transition:border .2s}
        input:focus{border-color:#0969da}
        button{display:block;width:100%;background:#0969da;color:#fff;border:none;border-radius:8px;padding:10px 12px;font-size:14px;cursor:pointer}
        button:hover{background:#0557b3}
        .footer{margin-top:14px;text-align:center}
        a.link{color:#0969da;text-decoration:none}
    </style>
</head>
<body>
<div class="container">
    <h1>注册</h1>
    <div th:if="${error}" style="color: red; margin-bottom: 14px;" th:text="${error}"></div>
    <form method="post" action="/register">
        <div class="field">
            <label for="reg-username">用户名</label>
            <input id="reg-username" name="username" type="text" placeholder="请输入用户名" required>
        </div>
        <div class="field">
            <label for="reg-email">邮箱</label>
            <input id="reg-email" name="email" type="email" placeholder="请输入邮箱地址" required>
        </div>
        <div class="field">
            <label for="reg-password">密码</label>
            <input id="reg-password" name="password" type="password" placeholder="请输入密码" required>
        </div>
        <div class="field">
            <label for="reg-confirm">确认密码</label>
            <input id="reg-confirm" name="confirm" type="password" placeholder="请再次输入密码" required>
        </div>
        <button type="submit">注册</button>
        <div class="footer">已有账号？<a class="link" href="/login">返回登录</a></div>
    </form>
</div>
</body>
</html>
