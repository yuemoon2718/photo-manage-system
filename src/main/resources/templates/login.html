<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,PingFang SC,Hiragino Sans GB,Microsoft YaHei,sans-serif;background:#B3DFFF;margin:0}
        .container{max-width:420px;margin:8vh auto;background:#fff;border-radius:12px;box-shadow:0 6px 24px rgba(0,0,0,.08);padding:28px}
        *,*:before,*:after{box-sizing:border-box}
        h1{font-size:22px;margin:0 0 18px}
        .hint{color:#666;font-size:12px;margin-bottom:16px}
        .form-centered{max-width:360px;margin:0 auto}
        .field{margin-bottom:14px}
        label{display:block;color:#333;font-size:13px;margin-bottom:6px}
        input{display:block;width:100%;padding:10px 12px;border:1px solid #d0d7de;border-radius:8px;outline:none;transition:border .2s}
        input:focus{border-color:#0969da}
        .error{background:#ffeef0;border:1px solid #ffdce0;color:#86181d;border-radius:8px;padding:10px 12px;margin-bottom:14px}
        button{display:block;width:100%;background:#0969da;color:#fff;border:none;border-radius:8px;padding:10px 12px;font-size:14px;cursor:pointer}
        button:hover{background:#0557b3}
        .footer{margin-top:14px;color:#666;font-size:12px;text-align:center}
    </style>
    <meta name="color-scheme" content="light dark">
</head>
<body>
<div class="container">
    <h1>登录</h1>
    <div th:if="${error}" class="error" th:text="${error}"></div>
    <form method="post" action="/login">
        <div class="field">
            <label for="username">用户名</label>
            <input id="username" name="username" type="text" placeholder="请输入用户名" required>
        </div>
        <div class="field">
            <label for="password">密码</label>
            <input id="password" name="password" type="password" placeholder="请输入密码" required>
        </div>
        <button type="submit">登录</button>
        <div class="hint" style="text-align:center;margin-top:10px">还没账号？<a href="/register" style="color:#0969da;text-decoration:none">点击注册</a></div>
    </form>
    <script>
        document.getElementById('username').focus();
    </script>
    <noscript>需要启用JavaScript以获得最佳体验</noscript>
</div>
</body>
</html>
